name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 每天北京时间 18:00
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 开启荐股逻辑
          - market-only   # 仅大盘复盘
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置环境
        uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # 【屏蔽持仓的关键】：设置为假数据，程序找不到真实持仓就不会去分析
          STOCK_LIST: '000000' 
          # 【开启荐股的关键】：设置开关
          ENABLE_STOCK_RECOMMENDATION: 'true'
          REPORT_TYPE: 'simple'
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          # 通过传入 --no-stocks 参数，强制跳过持仓分析逻辑
          python main.py --mode $MODE --no-stocks
